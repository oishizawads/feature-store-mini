<!doctype html>
<html lang="ja">
<head>

<title>Feature Store Mini</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/style.css" />
<style>
  html,body,#root{height:100%;margin:0}
  #boot{font-family:'Inter',system-ui,sans-serif;color:#0f172a;
    display:flex;align-items:center;justify-content:center;height:100vh;
    background:#f8fafc;flex-direction:column;gap:12px}
  #boot .k{color:#0f766e;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.72rem}

<body>
<div id="root"><div id="boot"><div class="k">Loading demo</div><div>Feature Store Mini を起動中… 初回はPython実行環境の読み込みに数十秒かかります。</div></div></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["numpy", "pandas"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"Feature Store Mini — Streamlit エントリポイント。\n\nUI は薄く保ち、集計ロジックは src/ に委譲する。\n実行: streamlit run app/streamlit_app.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport pandas as pd\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).resolve().parents[1]))\n\nfrom src.brand import apply_brand, hero\nfrom src.catalog import (\n    FEATURE_DEFS,\n    build_catalog,\n    freshness_flag,\n    generate_sample_frame,\n)\n\nst.set_page_config(page_title=\"Feature Store Mini\", page_icon=\"🗂️\", layout=\"wide\")\napply_brand(st)\n\n\n@st.cache_data(show_spinner=False)\ndef _catalog(seed: int, n: int) -> pd.DataFrame:\n    return build_catalog(seed=seed, n=n)\n\n\n@st.cache_data(show_spinner=False)\ndef _frame(seed: int, n: int) -> pd.DataFrame:\n    return generate_sample_frame(n=n, seed=seed)\n\n\ndef main() -> None:\n    st.sidebar.title(\"Feature Store Mini\")\n    st.sidebar.caption(\"架空メタデータ・合成データのデモ\")\n    seed = st.sidebar.number_input(\"シード\", min_value=0, max_value=9999, value=42, step=1)\n    n = st.sidebar.slider(\"サンプル行数\", 50, 2000, 500, 50)\n    categories = sorted({f.category for f in FEATURE_DEFS})\n    owners = sorted({f.owner for f in FEATURE_DEFS})\n    cat_sel = st.sidebar.multiselect(\"カテゴリで絞り込み\", categories, default=categories)\n    owner_sel = st.sidebar.multiselect(\"owner で絞り込み\", owners, default=owners)\n\n    hero(\n        st,\n        \"Feature Management\",\n        \"Feature Store Mini\",\n        \"特徴量の定義・更新頻度・欠損率・鮮度を一覧し、特徴量管理と再現性の考え方を示します。\",\n    )\n\n    catalog = _catalog(int(seed), int(n)).copy()\n    catalog = catalog[\n        catalog[\"category\"].isin(cat_sel) & catalog[\"owner\"].isin(owner_sel)\n    ]\n\n    if catalog.empty:\n        st.info(\"フィルタに該当する特徴量がありません。カテゴリ / owner の選択を見直してください。\")\n        st.stop()\n\n    c1, c2, c3, c4 = st.columns(4)\n    c1.metric(\"特徴量数\", len(catalog))\n    c2.metric(\"平均欠損率\", f\"{catalog['missing_rate'].mean():.1%}\")\n    c3.metric(\"stale 特徴量数\", int((catalog[\"freshness_days\"] > 7).sum()))\n    c4.metric(\"owner 数\", catalog[\"owner\"].nunique())\n\n    st.divider()\n    st.subheader(\"特徴量カタログ\")\n    view = catalog.copy()\n    view[\"鮮度\"] = view[\"freshness_days\"].map(lambda d: freshness_flag(int(d)))\n    view[\"欠損率\"] = view[\"missing_rate\"].map(lambda r: f\"{r:.1%}\")\n    view = view.rename(\n        columns={\n            \"feature\": \"特徴量\", \"dtype\": \"型\", \"category\": \"カテゴリ\",\n            \"owner\": \"owner\", \"update_freq\": \"更新頻度\", \"freshness_days\": \"経過日数\",\n        }\n    )[[\"特徴量\", \"型\", \"カテゴリ\", \"owner\", \"更新頻度\", \"経過日数\", \"鮮度\", \"欠損率\"]]\n    st.dataframe(view, width=\"stretch\", hide_index=True)\n\n    st.subheader(\"欠損率（特徴量別）\")\n    bar = catalog[[\"feature\", \"missing_rate\"]].set_index(\"feature\")\n    st.bar_chart(bar, height=280)\n\n    st.subheader(\"特徴量の詳細\")\n    names = list(catalog[\"feature\"])\n    pick = st.selectbox(\"特徴量を選択\", names)\n    fdef = next((f for f in FEATURE_DEFS if f.name == pick), None)\n    if fdef is not None:\n        st.markdown(\n            f\"**{fdef.name}** — {fdef.definition}\\n\\n\"\n            f\"- 型: `{fdef.dtype}` / カテゴリ: `{fdef.category}` / owner: `{fdef.owner}`\\n\"\n            f\"- 更新頻度: `{fdef.update_freq}` / 鮮度: {freshness_flag(fdef.freshness_days)}\"\n        )\n\n    st.divider()\n    st.caption(\n        \"本アプリは架空メタデータ・合成データのデモであり、本格的な Feature Store の代替ではありません。\"\n    )\n\n\nif __name__ == \"__main__\":\n    main()\n", "src/__init__.py": "", "src/brand.py": "\"\"\"portfolio-hub と視覚言語を揃える共通ブランドテーマ（Streamlit 用）。\n\n- near-white グラデ背景 / slate 文字 / teal・blue アクセント\n- 半透明の白カード + blur / 8px 角丸 / uppercase キッカー + 大きな見出し\n\n外部依存なし。各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero\n    apply_brand(st)          # set_page_config の後に一度だけ\n    hero(st, \"Kicker\", \"タイトル\", \"サブ説明\")\n\"\"\"\n\nfrom __future__ import annotations\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');\n\n:root {\n  --bg:#f8fafc; --fg:#0f172a; --muted:rgba(15,23,42,0.66);\n  --surface:rgba(255,255,255,0.82); --line:rgba(15,23,42,0.12);\n  --accent:#0f766e; --accent2:#2563eb;\n  --shadow:0 18px 50px rgba(15,23,42,0.08);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li, span, label,\nh1, h2, h3, h4, button, input, textarea, select,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricLabel\"],\n[data-testid=\"stWidgetLabel\"] {\n  font-family: 'Inter', system-ui, -apple-system, \"Segoe UI\", sans-serif;\n}\n\n/* 背景グラデ（portfolio-hub .portfolio-shell 相当） */\n.stApp {\n  background:\n    linear-gradient(180deg, rgba(248,250,252,0.92), rgba(241,245,249,0.96) 42%, rgba(15,23,42,0.05)),\n    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.95), rgba(219,234,254,0.55) 42%, rgba(15,23,42,0.06));\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.2rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 800 !important; letter-spacing: -0.02em; line-height: 1.05; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\nh3 { font-weight: 700 !important; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 6px 0 30px; }\n.brand-kicker {\n  color: var(--accent); font-size: .78rem; font-weight: 700;\n  letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-size: clamp(2.1rem, 5vw, 3.5rem); font-weight: 800;\n  line-height: 1.03; letter-spacing: -0.025em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1.02rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n\n/* サイドバー = 半透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: rgba(255,255,255,0.72); backdrop-filter: blur(16px);\n  border-right: 1px solid var(--line);\n}\n[data-testid=\"stSidebar\"] .brand-kicker { margin-top: 4px; }\n\n/* metric をカード化 */\n[data-testid=\"stMetric\"] {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow);\n  backdrop-filter: blur(12px);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 800; }\n[data-testid=\"stMetricLabel\"] { color: var(--muted); }\n\n/* ボタン = ダークプライマリ */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 8px; border: 1px solid #0f172a; background: #0f172a;\n  color: #fff; font-weight: 700; padding: 8px 16px;\n  transition: transform .15s ease, background .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: #020617; transform: translateY(-1px); border-color: #0f172a; color: #fff;\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 6px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 700; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--fg); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 8px !important; }\n\n/* 通知・区切り */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\n</style>\n\"\"\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(st, kicker: str, title: str, subtitle: str | None = None) -> None:\n    \"\"\"portfolio-hub 風のヒーロー見出し（キッカー + 大見出し + サブ説明）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n", "src/catalog.py": "\"\"\"特徴量カタログのメタデータと合成サンプルテーブルの生成・集計。\n\nUI から切り離した純粋ロジック。すべて合成データ（seed 固定で再現可能）。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\nimport pandas as pd\n\n\n@dataclass(frozen=True)\nclass FeatureDef:\n    name: str\n    dtype: str\n    category: str\n    owner: str\n    update_freq: str\n    freshness_days: int  # 最終更新からの経過日数\n    definition: str\n\n\n# 架空の特徴量メタデータ（実在の企業・データとは無関係）\nFEATURE_DEFS: list[FeatureDef] = [\n    FeatureDef(\"user_age\", \"int\", \"user\", \"growth-team\", \"daily\", 1,\n               \"利用者の年齢（登録情報から算出）\"),\n    FeatureDef(\"days_since_signup\", \"int\", \"user\", \"growth-team\", \"daily\", 1,\n               \"登録からの経過日数\"),\n    FeatureDef(\"sessions_7d\", \"int\", \"activity\", \"product-team\", \"hourly\", 0,\n               \"直近7日のセッション数\"),\n    FeatureDef(\"avg_session_minutes\", \"float\", \"activity\", \"product-team\", \"hourly\", 0,\n               \"1セッションあたり平均滞在分数\"),\n    FeatureDef(\"purchases_30d\", \"int\", \"revenue\", \"revenue-team\", \"daily\", 2,\n               \"直近30日の購入回数\"),\n    FeatureDef(\"ltv_estimate\", \"float\", \"revenue\", \"ds-team\", \"weekly\", 6,\n               \"推定生涯価値（簡易モデル出力）\"),\n    FeatureDef(\"is_premium\", \"bool\", \"revenue\", \"revenue-team\", \"daily\", 1,\n               \"有料プラン加入フラグ\"),\n    FeatureDef(\"region\", \"category\", \"user\", \"growth-team\", \"monthly\", 20,\n               \"利用者の地域区分（一般化済み）\"),\n    FeatureDef(\"device_type\", \"category\", \"activity\", \"product-team\", \"daily\", 1,\n               \"主要利用デバイス種別\"),\n    FeatureDef(\"churn_score\", \"float\", \"ml\", \"ds-team\", \"daily\", 3,\n               \"解約予測スコア（0..1、モデル出力）\"),\n]\n\n# 特徴量ごとの想定欠損率（合成データ生成用）\n_MISSING_RATE = {\n    \"user_age\": 0.02, \"days_since_signup\": 0.0, \"sessions_7d\": 0.01,\n    \"avg_session_minutes\": 0.05, \"purchases_30d\": 0.03, \"ltv_estimate\": 0.12,\n    \"is_premium\": 0.0, \"region\": 0.08, \"device_type\": 0.04, \"churn_score\": 0.15,\n}\n\n\ndef generate_sample_frame(n: int = 500, seed: int = 42) -> pd.DataFrame:\n    \"\"\"カタログ定義に沿った合成サンプルテーブルを返す（seed 固定で再現可能）。\"\"\"\n    if n <= 0:\n        return pd.DataFrame(columns=[f.name for f in FEATURE_DEFS])\n    rng = np.random.default_rng(seed)\n    cols: dict[str, np.ndarray] = {}\n    for f in FEATURE_DEFS:\n        if f.name == \"user_age\":\n            v = rng.integers(18, 70, n).astype(float)\n        elif f.name == \"days_since_signup\":\n            v = rng.integers(0, 900, n).astype(float)\n        elif f.name == \"sessions_7d\":\n            v = rng.poisson(5, n).astype(float)\n        elif f.name == \"avg_session_minutes\":\n            v = np.round(rng.gamma(2.0, 4.0, n), 2)\n        elif f.name == \"purchases_30d\":\n            v = rng.poisson(1.2, n).astype(float)\n        elif f.name == \"ltv_estimate\":\n            v = np.round(rng.gamma(3.0, 40.0, n), 2)\n        elif f.name == \"is_premium\":\n            v = rng.random(n) < 0.22\n            v = v.astype(object)\n        elif f.name == \"region\":\n            v = rng.choice([\"north\", \"south\", \"east\", \"west\"], n).astype(object)\n        elif f.name == \"device_type\":\n            v = rng.choice([\"ios\", \"android\", \"web\"], n).astype(object)\n        elif f.name == \"churn_score\":\n            v = np.round(rng.beta(2.0, 5.0, n), 3)\n        else:  # pragma: no cover - 定義漏れの保険\n            v = rng.random(n)\n\n        # 欠損の注入\n        rate = _MISSING_RATE.get(f.name, 0.0)\n        if rate > 0:\n            mask = rng.random(n) < rate\n            v = pd.Series(v)\n            v[mask] = np.nan\n            cols[f.name] = v.to_numpy()\n        else:\n            cols[f.name] = np.asarray(v)\n    return pd.DataFrame(cols)\n\n\ndef missing_rates(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"列ごとの欠損率を返す（feature, missing_rate）。空データでも落ちない。\"\"\"\n    if df is None or df.empty or df.shape[1] == 0:\n        return pd.DataFrame(columns=[\"feature\", \"missing_rate\"])\n    rates = df.isna().mean()\n    return pd.DataFrame(\n        {\"feature\": rates.index, \"missing_rate\": rates.to_numpy(dtype=float)}\n    )\n\n\ndef build_catalog(seed: int = 42, n: int = 500) -> pd.DataFrame:\n    \"\"\"メタデータ + 実測欠損率 + 鮮度をまとめた特徴量カタログを返す。\"\"\"\n    df = generate_sample_frame(n=n, seed=seed)\n    mr = dict(zip(*[missing_rates(df)[c] for c in (\"feature\", \"missing_rate\")])) if not df.empty else {}\n    rows = []\n    for f in FEATURE_DEFS:\n        rows.append(\n            {\n                \"feature\": f.name,\n                \"dtype\": f.dtype,\n                \"category\": f.category,\n                \"owner\": f.owner,\n                \"update_freq\": f.update_freq,\n                \"freshness_days\": f.freshness_days,\n                \"missing_rate\": float(mr.get(f.name, 0.0)),\n            }\n        )\n    return pd.DataFrame(rows)\n\n\ndef freshness_flag(freshness_days: int, threshold: int = 7) -> str:\n    \"\"\"鮮度を人間可読なフラグに変換する。\"\"\"\n    if freshness_days <= 1:\n        return \"🟢 fresh\"\n    if freshness_days <= threshold:\n        return \"🟡 ok\"\n    return \"🔴 stale\"\n", ".streamlit/config.toml": "[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f8fafc\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0f172a\"\nfont = \"sans serif\"\n"}}, document.getElementById("root"));
</script>
</body>
</html>
