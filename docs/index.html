<div id="root"><div id="boot"><div class="k">Loading demo</div><div>Feature Store Mini を起動中… 初回はPython実行環境の読み込みに数十秒かかります。</div></div></div>
<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["numpy", "pandas", "altair"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"Feature Store Mini — Streamlit エントリポイント。\n\nUI は薄く保ち、集計ロジックは src/ に委譲する。\n実行: streamlit run app/streamlit_app.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport altair as alt\nimport pandas as pd\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).resolve().parents[1]))\n\nfrom src.brand import (\n    apply_brand,\n    footer_backlink,\n    hero,\n    section,\n    sidebar_header,\n    themed_altair,\n    show_table,\n)\nfrom src.catalog import (\n    FEATURE_DEFS,\n    build_catalog,\n    freshness_flag,\n    generate_sample_frame,\n)\n\nst.set_page_config(page_title=\"Feature Store Mini\", page_icon=\"🗂️\", layout=\"wide\")\napply_brand(st)\nthemed_altair(alt)\n\n\n@st.cache_data(show_spinner=False)\ndef _catalog(seed: int, n: int) -> pd.DataFrame:\n    return build_catalog(seed=seed, n=n)\n\n\n@st.cache_data(show_spinner=False)\ndef _frame(seed: int, n: int) -> pd.DataFrame:\n    return generate_sample_frame(n=n, seed=seed)\n\n\ndef main() -> None:\n    sidebar_header(st, \"Feature Store Mini\")\n    seed = st.sidebar.number_input(\"シード\", min_value=0, max_value=9999, value=42, step=1)\n    n = st.sidebar.slider(\"サンプル行数\", 50, 2000, 500, 50)\n    categories = sorted({f.category for f in FEATURE_DEFS})\n    owners = sorted({f.owner for f in FEATURE_DEFS})\n    cat_sel = st.sidebar.multiselect(\"カテゴリで絞り込み\", categories, default=categories)\n    owner_sel = st.sidebar.multiselect(\"owner で絞り込み\", owners, default=owners)\n\n    hero(\n        st,\n        \"FEATURE STORE\",\n        \"Feature Store Mini\",\n        \"特徴量の定義・更新頻度・欠損率・鮮度を一覧し、特徴量管理と再現性の考え方を示します。\",\n        chips=[\"Python\", \"Pandas\", \"Altair\", \"Feature Management\"],\n    )\n\n    catalog = _catalog(int(seed), int(n)).copy()\n    catalog = catalog[\n        catalog[\"category\"].isin(cat_sel) & catalog[\"owner\"].isin(owner_sel)\n    ]\n\n    if catalog.empty:\n        st.info(\"フィルタに該当する特徴量がありません。カテゴリ / owner の選択を見直してください。\")\n        st.stop()\n\n    c1, c2, c3, c4 = st.columns(4)\n    c1.metric(\"特徴量数\", len(catalog))\n    c2.metric(\"平均欠損率\", f\"{catalog['missing_rate'].mean():.1%}\")\n    c3.metric(\"stale 特徴量数\", int((catalog[\"freshness_days\"] > 7).sum()))\n    c4.metric(\"owner 数\", catalog[\"owner\"].nunique())\n\n    st.divider()\n    section(st, \"FEATURE CATALOG\", \"特徴量カタログ\")\n    view = catalog.copy()\n    view[\"鮮度\"] = view[\"freshness_days\"].map(lambda d: freshness_flag(int(d)))\n    view[\"欠損率\"] = view[\"missing_rate\"].map(lambda r: f\"{r:.1%}\")\n    view = view.rename(\n        columns={\n            \"feature\": \"特徴量\", \"dtype\": \"型\", \"category\": \"カテゴリ\",\n            \"owner\": \"owner\", \"update_freq\": \"更新頻度\", \"freshness_days\": \"経過日数\",\n        }\n    )[[\"特徴量\", \"型\", \"カテゴリ\", \"owner\", \"更新頻度\", \"経過日数\", \"鮮度\", \"欠損率\"]]\n    show_table(st, view)\n\n    section(st, \"FEATURE STATS\", \"欠損率（特徴量別）\")\n    bar_data = catalog[[\"feature\", \"missing_rate\"]].copy()\n    chart = (\n        alt.Chart(bar_data)\n        .mark_bar()\n        .encode(\n            x=alt.X(\n                \"missing_rate:Q\",\n                axis=alt.Axis(format=\"%\", title=\"欠損率\"),\n                scale=alt.Scale(domainMin=0),\n            ),\n            y=alt.Y(\"feature:N\", sort=\"-x\", title=None),\n            tooltip=[\n                alt.Tooltip(\"feature:N\", title=\"特徴量\"),\n                alt.Tooltip(\"missing_rate:Q\", format=\".1%\", title=\"欠損率\"),\n            ],\n        )\n        .properties(height=280)\n    )\n    st.altair_chart(chart, width=\"stretch\")\n\n    section(st, \"FEATURE DETAIL\", \"特徴量の詳細\")\n    names = list(catalog[\"feature\"])\n    pick = st.selectbox(\"特徴量を選択\", names)\n    fdef = next((f for f in FEATURE_DEFS if f.name == pick), None)\n    if fdef is not None:\n        st.markdown(\n            f\"**{fdef.name}** — {fdef.definition}\\n\\n\"\n            f\"- 型: `{fdef.dtype}` / カテゴリ: `{fdef.category}` / owner: `{fdef.owner}`\\n\"\n            f\"- 更新頻度: `{fdef.update_freq}` / 鮮度: {freshness_flag(fdef.freshness_days)}\"\n        )\n\n    footer_backlink(st, repo=\"feature-store-mini\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "src/__init__.py": "", "src/brand.py": "\"\"\"Portfolio Design System v2 \"Ink & Signal\" — Streamlit 共通ブランドテーマ。\n\nportfolio-hub と12デモで視覚言語を揃える単一ファイル。外部依存なし。\n正典: portfolio-plan/brand/brand.py（各リポの src/brand.py へそのままコピーする）\n仕様: portfolio-plan/design-system.md\n\n各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero, section, sidebar_header, footer_backlink\n    apply_brand(st)                      # set_page_config の後に一度だけ\n    hero(st, \"KICKER\", \"タイトル\", \"サブ説明\", chips=[\"python\", \"altair\"])\n    ...\n    footer_backlink(st, repo=\"rag-eval-dashboard\")\n\nAltair を使うアプリは import 直後に::\n\n    import altair as alt\n    from src.brand import themed_altair\n    themed_altair(alt)\n\nPlotly を使うアプリは figure ごとに::\n\n    fig.update_layout(**plotly_template())\n\"\"\"\n\nfrom __future__ import annotations\n\nPALETTE = [\"#0f766e\", \"#2563eb\", \"#d97706\", \"#be185d\", \"#7c3aed\", \"#64748b\"]\n\n_FONT_BODY = \"'Inter', 'Noto Sans JP', system-ui, sans-serif\"\n_FONT_DISPLAY = \"'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif\"\n_FONT_MONO = \"'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace\"\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');\n/* stlite は Material Symbols を同梱しないため明示ロード（expander 矢印等の豆腐化防止） */\n@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block');\n\n:root {\n  --bg:#f6f7f9; --fg:#0d1526; --muted:#5b6474;\n  --surface:#ffffff;\n  --line:rgba(13,21,38,0.10); --line-strong:rgba(13,21,38,0.20);\n  --accent:#0f766e; --accent-strong:#115e59; --link:#2563eb; --dark:#0b1220;\n  --shadow:0 1px 2px rgba(13,21,38,.05), 0 8px 24px rgba(13,21,38,.06);\n  --shadow-hover:0 2px 4px rgba(13,21,38,.06), 0 16px 40px rgba(13,21,38,.10);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li,\nspan:not([data-testid=\"stIconMaterial\"]):not([class*=\"material-symbols\"]),\nlabel, button, input, textarea, select,\n[data-testid=\"stWidgetLabel\"], [data-testid=\"stMetricLabel\"] {\n  font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif;\n}\n/* Material Symbols のリガチャを死守（expander 矢印等） */\n[data-testid=\"stIconMaterial\"], [class*=\"material-symbols\"] {\n  font-family: 'Material Symbols Rounded' !important;\n}\nh1, h2, h3, h4 {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n}\ncode, pre, kbd,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricDelta\"] {\n  font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;\n  font-variant-numeric: tabular-nums;\n}\n\n/* 背景：ほぼ無地＋上部にごく薄い teal の気配 */\n.stApp {\n  background:\n    radial-gradient(1200px 480px at 50% -160px, rgba(15,118,110,0.07), transparent 70%),\n    #f6f7f9;\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.4rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 700 !important; letter-spacing: -0.03em; line-height: 1.08; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.02em; color: var(--fg); }\nh3 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 4px 0 34px; }\n.brand-kicker {\n  color: var(--accent); font-size: .75rem; font-weight: 700;\n  letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: clamp(2.1rem, 4.5vw, 3.2rem); font-weight: 700;\n  line-height: 1.08; letter-spacing: -0.03em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n.brand-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }\n.brand-chip {\n  border: 1px solid var(--line); border-radius: 999px; background: var(--surface);\n  padding: 4px 12px; color: var(--muted); font-size: .78rem; font-weight: 600;\n  font-family: 'IBM Plex Mono', ui-monospace, monospace;\n}\n\n/* セクション見出し */\n.brand-section { margin: 34px 0 6px; }\n.brand-section .brand-kicker { margin-bottom: 6px; }\n.brand-section-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em;\n  color: var(--fg); margin: 0;\n}\n\n/* サイドバー：不透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: #fbfcfd;\n  border-right: 1px solid var(--line);\n}\n.brand-side-title {\n  font-family: 'Space Grotesk', 'Inter', 'Noto Sans JP', sans-serif;\n  font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em;\n  color: var(--fg); margin: 2px 0 2px;\n}\n\n/* metric をカード化（左に accent の芯） */\n[data-testid=\"stMetric\"] {\n  background: var(--surface);\n  border: 1px solid var(--line); border-left: 3px solid var(--accent);\n  border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 600; }\n[data-testid=\"stMetricLabel\"] {\n  color: var(--muted); font-size: .74rem; font-weight: 600;\n  letter-spacing: .08em; text-transform: uppercase;\n}\n\n/* ボタン */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 10px; border: 1px solid var(--fg); background: var(--fg);\n  color: #fff; font-weight: 600; padding: 8px 18px;\n  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: var(--dark); border-color: var(--dark); color: #fff;\n  transform: translateY(-1px); box-shadow: var(--shadow);\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 4px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 600; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--accent-strong); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow); background: var(--surface);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 10px !important; }\n\n/* 通知・区切り・リンク */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\na { color: var(--link); }\n\n/* 静的テーブル（st.dataframe の stlite 代替） */\n.brand-table-wrap {\n  overflow-x: auto; border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n.brand-table { width: 100%; border-collapse: collapse; font-size: .88rem; }\n.brand-table th {\n  text-align: left; color: var(--muted); font-size: .72rem; font-weight: 600;\n  letter-spacing: .06em; text-transform: uppercase;\n  padding: 10px 14px; border-bottom: 1px solid var(--line-strong); background: #fbfcfd;\n}\n.brand-table td {\n  padding: 9px 14px; border-bottom: 1px solid var(--line);\n  color: var(--fg); font-variant-numeric: tabular-nums;\n}\n.brand-table tr:last-child td { border-bottom: none; }\n\n/* フッター */\n.brand-footer {\n  margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--line);\n  display: flex; flex-wrap: wrap; gap: 8px 20px;\n  align-items: center; justify-content: space-between;\n  color: var(--muted); font-size: .82rem; line-height: 1.7;\n}\n.brand-footer a { color: var(--accent-strong); font-weight: 600; text-decoration: none; }\n.brand-footer a:hover { text-decoration: underline; }\n</style>\n\"\"\"\n\nHUB_URL = \"https://oishizawads.github.io/portfolio-hub/\"\nGITHUB_OWNER = \"oishizawads\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(\n    st,\n    kicker: str,\n    title: str,\n    subtitle: str | None = None,\n    chips: list[str] | None = None,\n) -> None:\n    \"\"\"ヒーロー見出し（キッカー + 大見出し + サブ説明 + 技術チップ）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    if chips:\n        html += '<div class=\"brand-chips\">'\n        html += \"\".join(f'<span class=\"brand-chip\">{_esc(c)}</span>' for c in chips)\n        html += \"</div>\"\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n\n\ndef section(st, kicker: str, title: str) -> None:\n    \"\"\"本文セクション見出し（kicker + タイトル）。``st.header`` の代替。\"\"\"\n    st.markdown(\n        '<div class=\"brand-section\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-section-title\">{_esc(title)}</div>'\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef sidebar_header(st, title: str, caption: str | None = None) -> None:\n    \"\"\"サイドバー先頭の見出し。\"\"\"\n    html = (\n        '<div class=\"brand-kicker\" style=\"margin-top:4px\">Controls</div>'\n        f'<div class=\"brand-side-title\">{_esc(title)}</div>'\n    )\n    st.sidebar.markdown(html, unsafe_allow_html=True)\n    if caption:\n        st.sidebar.caption(caption)\n\n\ndef footer_backlink(st, repo: str | None = None) -> None:\n    \"\"\"合成データ注記と Portfolio Hub への戻りリンクを持つ共通フッター。\"\"\"\n    links = f'<a href=\"{HUB_URL}\">← Portfolio Hub</a>'\n    if repo:\n        links += (\n            f' &nbsp; <a href=\"https://github.com/{GITHUB_OWNER}/{_esc(repo)}\">'\n            \"GitHub ↗</a>\"\n        )\n    st.markdown(\n        '<div class=\"brand-footer\">'\n        \"<span>Synthetic data demo — 数値はすべて合成データで、実在の精度・効果を示しません。</span>\"\n        f\"<span>{links}</span>\"\n        \"</div>\",\n        unsafe_allow_html=True,\n    )\n\n\ndef show_table(st, df, hide_index: bool = True, float_fmt: str | None = None) -> None:\n    \"\"\"静的 HTML テーブルとして描画する。\n\n    stlite 1.8 系では st.dataframe（glide-data-grid）が空描画になるため、\n    デモの一覧表示はこのヘルパーで代替する。\n    \"\"\"\n    data = df.copy()\n    if float_fmt:\n        for col in data.columns:\n            if getattr(data[col].dtype, \"kind\", \"\") == \"f\":\n                data[col] = data[col].map(lambda v: float_fmt.format(v))\n    html = data.to_html(index=not hide_index, classes=\"brand-table\", border=0)\n    st.markdown(f'<div class=\"brand-table-wrap\">{html}</div>', unsafe_allow_html=True)\n\n\ndef altair_config() -> dict:\n    \"\"\"ブランド仕様の Altair テーマ設定を返す。\"\"\"\n    return {\n        \"config\": {\n            \"background\": \"transparent\",\n            \"font\": _FONT_BODY,\n            \"range\": {\"category\": PALETTE},\n            \"axis\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n                \"titleFontWeight\": 600,\n                \"labelFontSize\": 12,\n                \"titleFontSize\": 12,\n                \"gridColor\": \"rgba(13,21,38,0.08)\",\n                \"domainColor\": \"rgba(13,21,38,0.20)\",\n                \"tickColor\": \"rgba(13,21,38,0.20)\",\n            },\n            \"legend\": {\n                \"labelFont\": _FONT_BODY,\n                \"titleFont\": _FONT_BODY,\n                \"labelColor\": \"#5b6474\",\n                \"titleColor\": \"#0d1526\",\n            },\n            \"title\": {\n                \"font\": _FONT_DISPLAY,\n                \"color\": \"#0d1526\",\n                \"fontSize\": 15,\n                \"fontWeight\": 700,\n                \"anchor\": \"start\",\n            },\n            \"view\": {\"stroke\": \"transparent\"},\n            \"bar\": {\"color\": PALETTE[0]},\n            \"line\": {\"color\": PALETTE[0], \"strokeWidth\": 2.5},\n            \"point\": {\"color\": PALETTE[0], \"filled\": True, \"size\": 70},\n            \"area\": {\"color\": PALETTE[0], \"opacity\": 0.16, \"line\": True},\n            \"rule\": {\"color\": \"#5b6474\"},\n        }\n    }\n\n\ndef themed_altair(alt) -> None:\n    \"\"\"Altair にブランドテーマを登録して有効化する（バージョン差異を吸収）。\"\"\"\n    theme = altair_config\n\n    try:  # altair >= 5.5\n        alt.theme.register(\"brand\", enable=True)(theme)\n        return\n    except Exception:\n        pass\n    try:  # altair < 5.5\n        alt.themes.register(\"brand\", theme)\n        alt.themes.enable(\"brand\")\n    except Exception:\n        pass\n\n\ndef set_plotly_theme() -> None:\n    \"\"\"plotly express が色を焼き込む前にブランドテンプレートを既定化する。\n\n    figure 生成より前（import 直後）に一度だけ呼ぶ。\n    \"\"\"\n    import plotly.graph_objects as go\n    import plotly.io as pio\n\n    pio.templates[\"brand\"] = go.layout.Template(layout=plotly_template())\n    pio.templates.default = \"plotly_white+brand\"\n\n\ndef plotly_template() -> dict:\n    \"\"\"``fig.update_layout(**plotly_template())`` で適用する共通レイアウト。\"\"\"\n    grid = \"rgba(13,21,38,0.08)\"\n    zero = \"rgba(13,21,38,0.20)\"\n    return {\n        \"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\", \"color\": \"#0d1526\", \"size\": 13},\n        \"paper_bgcolor\": \"rgba(0,0,0,0)\",\n        \"plot_bgcolor\": \"rgba(0,0,0,0)\",\n        \"colorway\": PALETTE,\n        \"xaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"yaxis\": {\"gridcolor\": grid, \"zerolinecolor\": zero, \"linecolor\": zero},\n        \"legend\": {\"bgcolor\": \"rgba(0,0,0,0)\"},\n        \"margin\": {\"t\": 48, \"r\": 16, \"b\": 48, \"l\": 56},\n        \"hoverlabel\": {\"font\": {\"family\": \"Inter, Noto Sans JP, sans-serif\"}},\n    }\n", "src/catalog.py": "\"\"\"特徴量カタログのメタデータと合成サンプルテーブルの生成・集計。\n\nUI から切り離した純粋ロジック。すべて合成データ（seed 固定で再現可能）。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\nimport pandas as pd\n\n\n@dataclass(frozen=True)\nclass FeatureDef:\n    name: str\n    dtype: str\n    category: str\n    owner: str\n    update_freq: str\n    freshness_days: int  # 最終更新からの経過日数\n    definition: str\n\n\n# 架空の特徴量メタデータ（実在の企業・データとは無関係）\nFEATURE_DEFS: list[FeatureDef] = [\n    FeatureDef(\"user_age\", \"int\", \"user\", \"growth-team\", \"daily\", 1,\n               \"利用者の年齢（登録情報から算出）\"),\n    FeatureDef(\"days_since_signup\", \"int\", \"user\", \"growth-team\", \"daily\", 1,\n               \"登録からの経過日数\"),\n    FeatureDef(\"sessions_7d\", \"int\", \"activity\", \"product-team\", \"hourly\", 0,\n               \"直近7日のセッション数\"),\n    FeatureDef(\"avg_session_minutes\", \"float\", \"activity\", \"product-team\", \"hourly\", 0,\n               \"1セッションあたり平均滞在分数\"),\n    FeatureDef(\"purchases_30d\", \"int\", \"revenue\", \"revenue-team\", \"daily\", 2,\n               \"直近30日の購入回数\"),\n    FeatureDef(\"ltv_estimate\", \"float\", \"revenue\", \"ds-team\", \"weekly\", 6,\n               \"推定生涯価値（簡易モデル出力）\"),\n    FeatureDef(\"is_premium\", \"bool\", \"revenue\", \"revenue-team\", \"daily\", 1,\n               \"有料プラン加入フラグ\"),\n    FeatureDef(\"region\", \"category\", \"user\", \"growth-team\", \"monthly\", 20,\n               \"利用者の地域区分（一般化済み）\"),\n    FeatureDef(\"device_type\", \"category\", \"activity\", \"product-team\", \"daily\", 1,\n               \"主要利用デバイス種別\"),\n    FeatureDef(\"churn_score\", \"float\", \"ml\", \"ds-team\", \"daily\", 3,\n               \"解約予測スコア（0..1、モデル出力）\"),\n]\n\n# 特徴量ごとの想定欠損率（合成データ生成用）\n_MISSING_RATE = {\n    \"user_age\": 0.02, \"days_since_signup\": 0.0, \"sessions_7d\": 0.01,\n    \"avg_session_minutes\": 0.05, \"purchases_30d\": 0.03, \"ltv_estimate\": 0.12,\n    \"is_premium\": 0.0, \"region\": 0.08, \"device_type\": 0.04, \"churn_score\": 0.15,\n}\n\n\ndef generate_sample_frame(n: int = 500, seed: int = 42) -> pd.DataFrame:\n    \"\"\"カタログ定義に沿った合成サンプルテーブルを返す（seed 固定で再現可能）。\"\"\"\n    if n <= 0:\n        return pd.DataFrame(columns=[f.name for f in FEATURE_DEFS])\n    rng = np.random.default_rng(seed)\n    cols: dict[str, np.ndarray] = {}\n    for f in FEATURE_DEFS:\n        if f.name == \"user_age\":\n            v = rng.integers(18, 70, n).astype(float)\n        elif f.name == \"days_since_signup\":\n            v = rng.integers(0, 900, n).astype(float)\n        elif f.name == \"sessions_7d\":\n            v = rng.poisson(5, n).astype(float)\n        elif f.name == \"avg_session_minutes\":\n            v = np.round(rng.gamma(2.0, 4.0, n), 2)\n        elif f.name == \"purchases_30d\":\n            v = rng.poisson(1.2, n).astype(float)\n        elif f.name == \"ltv_estimate\":\n            v = np.round(rng.gamma(3.0, 40.0, n), 2)\n        elif f.name == \"is_premium\":\n            v = rng.random(n) < 0.22\n            v = v.astype(object)\n        elif f.name == \"region\":\n            v = rng.choice([\"north\", \"south\", \"east\", \"west\"], n).astype(object)\n        elif f.name == \"device_type\":\n            v = rng.choice([\"ios\", \"android\", \"web\"], n).astype(object)\n        elif f.name == \"churn_score\":\n            v = np.round(rng.beta(2.0, 5.0, n), 3)\n        else:  # pragma: no cover - 定義漏れの保険\n            v = rng.random(n)\n\n        # 欠損の注入\n        rate = _MISSING_RATE.get(f.name, 0.0)\n        if rate > 0:\n            mask = rng.random(n) < rate\n            v = pd.Series(v)\n            v[mask] = np.nan\n            cols[f.name] = v.to_numpy()\n        else:\n            cols[f.name] = np.asarray(v)\n    return pd.DataFrame(cols)\n\n\ndef missing_rates(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"列ごとの欠損率を返す（feature, missing_rate）。空データでも落ちない。\"\"\"\n    if df is None or df.empty or df.shape[1] == 0:\n        return pd.DataFrame(columns=[\"feature\", \"missing_rate\"])\n    rates = df.isna().mean()\n    return pd.DataFrame(\n        {\"feature\": rates.index, \"missing_rate\": rates.to_numpy(dtype=float)}\n    )\n\n\ndef build_catalog(seed: int = 42, n: int = 500) -> pd.DataFrame:\n    \"\"\"メタデータ + 実測欠損率 + 鮮度をまとめた特徴量カタログを返す。\"\"\"\n    df = generate_sample_frame(n=n, seed=seed)\n    mr = dict(zip(*[missing_rates(df)[c] for c in (\"feature\", \"missing_rate\")])) if not df.empty else {}\n    rows = []\n    for f in FEATURE_DEFS:\n        rows.append(\n            {\n                \"feature\": f.name,\n                \"dtype\": f.dtype,\n                \"category\": f.category,\n                \"owner\": f.owner,\n                \"update_freq\": f.update_freq,\n                \"freshness_days\": f.freshness_days,\n                \"missing_rate\": float(mr.get(f.name, 0.0)),\n            }\n        )\n    return pd.DataFrame(rows)\n\n\ndef freshness_flag(freshness_days: int, threshold: int = 7) -> str:\n    \"\"\"鮮度を人間可読なフラグに変換する。\"\"\"\n    if freshness_days <= 1:\n        return \"🟢 fresh\"\n    if freshness_days <= threshold:\n        return \"🟡 ok\"\n    return \"🔴 stale\"\n", ".streamlit/config.toml": "# Portfolio Design System v2 — 共通 Streamlit テーマ（正典: portfolio-plan/brand/config.toml）\n[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f6f7f9\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0d1526\"\nfont = \"sans serif\"\n"}}, document.getElementById("root"));
</script>
</body>
